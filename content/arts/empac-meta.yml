title: EMPAC at RPI
image: /hero/volcano.jpg
url: /arts/empac
date: 2025-03-21
description: The Curtis R. Priem Experimental Media and Performing Arts Center (EMPAC) at RPI is a unique facility that curates emerging artists from around the world and takes advantage of RPI's technical infrastructure and expertise to help them develop their ideas.  EMPAC is home to a world-famous concert hall, a state-of-the-art proscenium theater, two studios, and an advanced video and audio production suite.  I had the privilege of working for Stage Technologies (lighting, rigging, and staging) for over 2 years.
