title: Rensselaer Concert Choir
date: 2026-04-16
description: RPI's choir was founded in 1876, and I sang Tenor 1 for three years with this incredible ensemble! Under the direction of Dr. Robert Whalen, the choir performs a variety of works, from the Renaissance to contemporary pieces. The choir performed its first complete work in April 2026 and only continues to grow!
