description: The 2023 Evening of Performance was my first lighting design for the RPI Players.  Unfortunately, it also happened to be when the RPI Playhouse flooded and was closed indefinitely.  3 years later, my original lighting design is preserved on my RPI Playhouse Augment3d model.
