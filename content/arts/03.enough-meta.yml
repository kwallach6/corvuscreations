title: Am I Enough of Me
date: 2025-07-23
description: I had the privilege of being the lighting designer for Cliff Watson's "Am I Enough of Me", an experimental production that explored individuality in a dystopian corporate future through various media, including musical theatre, AR interaction, poetry, AI generated film, reality TV, and music.
