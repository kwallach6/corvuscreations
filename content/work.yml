title: Art Projects
description: Creativity is critical to good engineering, and everyone needs an outlet.  For me, that outlet is the theatre and music. Who knew going into college that I would have had so many lighting design experiences or so many great concerts?  Check out some of these experiences from my time in the choir, the theatre club, and even my professional gig work!
