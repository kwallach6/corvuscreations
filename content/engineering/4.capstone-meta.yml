title: Capstone Design Project
date: 2025-12-16
description: The Multidisciplinary Capstone Design project pairs a team of students with a sponsor representative to use their knowledge and experience from prior coursework to solve a problem for the sponsor. My capstone project addressed a foreign object debris (FOD) concern during an assembly process. Check out an overview of this course and select projects on the Design Lab's website (most projects, including mine, contain sensitive information that cannot be shared).
