description: The Multidisciplinary Capstone Design project pairs a team of students with a sponsor representative to use their knowledge and experience from prior coursework to solve a problem for the sponsor. My capstone project addressed a foreign object debris (FOD) concern during Monaghan Medical's AeroChamber Plus Flow Vu assembly process.
