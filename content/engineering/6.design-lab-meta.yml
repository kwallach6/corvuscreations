title: Design Lab Internship
description: My summer 2025 internship with the Design Lab @ RPI was my first time working on an industrial robot!  My work consisted of creating Octopuz and Robot Studio simulations of an ABB IRB1600 robot cell, as well as designing the necessary hardware and KiCad schematics for implementing a tool changer and gripper as a basis for future capstone teams to use in their projects.
