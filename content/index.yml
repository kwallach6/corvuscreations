title: Alex Wallach
about:
  title: About Me
  description: I am a Mechanical Engineering student with a passion for the performing arts.  I enjoy solving problems, building things, working as a lighting designer or master electrician for the theatre, and singing.  As an engineering student and an artist, I am excited to explore the intersection between the arts and engineering and I love to apply my knowledge across disciplines.  I am currently searching for entry level mechanical or manufacturing engineering jobs for a start date in June 2026.
description: B.S. Mechanical Engineering graduate from Rensselaer Polytechnic Institute (RPI)
