title: Kam Wallach
about:
  title: About Me
  description: I am a recent Mechanical Engineering graduate from RPI with a passion for the performing arts.  I enjoy solving problems, building things, working as a lighting designer or master electrician for the theatre, and singing.  As an engineering student and an artist, I am excited to explore the intersection between the arts and engineering and I love to apply my knowledge across disciplines.  I am currently searching for entry level mechanical or manufacturing engineering jobs for a start date in Summer or Fall 2026.
