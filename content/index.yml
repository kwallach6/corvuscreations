title: Kam Wallach
about:
  title: About Me
  description: I am a rising sophomore at Tufts University studying Community Health and Studio Art in the 5-year Combined Degree Program with the School of the Museum of Fine Arts at Tufts. I have a love for both the visual and performing arts that informs my way of thinking and how I approach my academics. Throughout my time in college, I am looking to gain experience in different art mediums and explore art and design as they relate to advocacy and the public interest sector, especially in relation to healthcare and health access.
