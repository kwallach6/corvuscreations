name: Test deployed site

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

jobs:
  check-seo:
    name: Verify deployed site
    runs-on: ubuntu-latest

    env:
      PRODUCTION_URL: https://awallach-portfolio.netlify.app

    steps:      
      - name: Check for Netlify skip
        id: skip
        run: |
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"

          if echo "$COMMIT_MESSAGE" | grep -qi "\[skip netlify\]"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Netlify deploy skipped"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine commit SHA
        id: commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find Netlify deploy
        id: deploy
        if: steps.skip.outputs.skip != 'true'
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          echo "Looking for Netlify deploy for commit:"
          echo "$COMMIT_SHA"

          for attempt in $(seq 1 60); do
            echo "Checking Netlify deploys ($attempt/60)"

            DEPLOYS=$(curl \
              --silent \
              --fail \
              -H "Authorization: Bearer $NETLIFY_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=100")

            DEPLOY_JSON=$(echo "$DEPLOYS" | jq -c '
              .[]
              | select(.commit_ref=="'"$COMMIT_SHA"'")
            ' | head -n 1)

            if [ -z "$DEPLOY_JSON" ]; then
              echo "No deploy found for this commit yet."
              sleep 10
              continue
            fi

            STATE=$(echo "$DEPLOY_JSON" | jq -r '.state')
            CONTEXT=$(echo "$DEPLOY_JSON" | jq -r '.context')

            echo "Deploy state: $STATE ($CONTEXT)"

            case "$STATE" in
              ready)
                if [ "$EVENT_NAME" = "pull_request" ]; then
                  DEPLOY_URL=$(echo "$DEPLOY_JSON" | jq -r '.deploy_ssl_url')
                else
                  DEPLOY_URL=$(echo "$DEPLOY_JSON" | jq -r '.ssl_url')
                fi

                echo "Found deploy:"
                echo "  $DEPLOY_URL"

                echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
                exit 0
                ;;

              building|processing|new|enqueued)
                echo "Deploy still in progress..."
                sleep 10
                ;;

              error|failed)
                echo "Netlify deploy failed."

                echo "$DEPLOY_JSON" | jq '
                  {
                    id,
                    state,
                    context,
                    created_at,
                    commit_ref,
                    deploy_ssl_url,
                    ssl_url,
                    error_message
                  }
                '

                exit 1
                ;;

              *)
                echo "Unexpected deploy state: $STATE"

                echo "$DEPLOY_JSON" | jq .

                sleep 10
                ;;
            esac
          done

          echo "Timed out waiting for Netlify deploy."

          echo ""
          echo "Matching deploys for commit:"
          echo "$DEPLOYS" | jq '
            .[]
            | select(.commit_ref == "'"$COMMIT_SHA"'")
            | {
                id,
                context,
                state,
                commit_ref,
                deploy_ssl_url,
                ssl_url,
                created_at
              }
          '

          exit 1

      - name: Set production URL
        if: github.event_name == 'push' && steps.skip.outputs.skip != 'true'
        id: production
        run: |
          echo "url=${{ env.PRODUCTION_URL }}" >> "$GITHUB_OUTPUT"

      - name: Resolve site URL
        id: site
        if: steps.skip.outputs.skip != 'true'
        run: |
          if [ "${{ steps.deploy.outputs.url }}" != "" ]; then
            echo "url=${{ steps.deploy.outputs.url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ steps.production.outputs.url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check homepage
        if: steps.skip.outputs.skip != 'true'
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
        run: |
          echo "Checking homepage"

          curl \
            --fail \
            --silent \
            --show-error \
            "$SITE_URL" \
            > homepage.html

          grep -q "<html" homepage.html || {
            echo "Homepage does not appear to be HTML"
            exit 1
          }

          grep -q "__NUXT__" homepage.html || {
            echo "Nuxt payload not found"
            exit 1
          }

          echo "Homepage loaded successfully"

      - name: Check robots.txt
        if: steps.skip.outputs.skip != 'true'
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
        run: |
          echo "Checking robots.txt"

          curl \
            --fail \
            --silent \
            --show-error \
            "$SITE_URL/robots.txt" \
            | tee robots.txt

          echo ""
          echo "robots.txt:"
          cat robots.txt

          # Ensure sitemap is advertised
          grep -qiE "^sitemap:" robots.txt || {
            echo "robots.txt does not reference a sitemap"
            exit 1
          }

          # Fail if the entire site is blocked
          if grep -qiE "^disallow:\s*/\s*$" robots.txt; then
            echo "robots.txt blocks all crawlers (Disallow: /)"
            exit 1
          fi

          echo "robots.txt allows crawling"

      - name: Check sitemap.xml
        if: steps.skip.outputs.skip != 'true'
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
        run: |
          echo "Checking sitemap.xml"

          curl \
            --fail \
            --silent \
            --show-error \
            "$SITE_URL/sitemap.xml" \
            > sitemap.xml

          echo ""
          echo "sitemap.xml:"
          cat sitemap.xml

          grep -q "<urlset" sitemap.xml || {
            echo "Invalid sitemap format"
            exit 1
          }

          echo "sitemap.xml looks good"
      
      - name: Check security headers
        if: steps.skip.outputs.skip != 'true'
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
        run: |
          echo "Checking security headers"

          curl \
            --silent \
            --show-error \
            --head \
            "$SITE_URL" \
            > headers.txt

          cat headers.txt

          grep -qi "content-security-policy" headers.txt || {
            echo "Missing Content-Security-Policy header"
            exit 1
          }

          grep -qi "x-content-type-options" headers.txt || {
            echo "Missing X-Content-Type-Options header"
            exit 1
          }

          grep -qi "x-frame-options" headers.txt || {
            echo "Missing X-Frame-Options header"
            exit 1
          }

          echo "Security headers present"

      - name: Check avatar image delivery
        if: steps.skip.outputs.skip != 'true'
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
          AVATAR_MARKER: "profile.jpg" # Change this to something unique in your avatar URL/path
        run: |
          echo "Checking avatar image delivery"

          curl \
            --fail \
            --silent \
            --show-error \
            "$SITE_URL" \
            > homepage.html

          IMAGE_URL=$(grep -oE 'srcset="[^"]+|src="[^"]+' homepage.html \
            | grep "$AVATAR_MARKER" \
            | head -n 1 \
            | sed -E 's/^(srcset|src)="//' \
            | cut -d',' -f1 \
            | awk '{print $1}')

          if [ -z "$IMAGE_URL" ]; then
            echo "Could not find avatar image URL"
            exit 1
          fi

          # Decode HTML entities
          IMAGE_URL=$(echo "$IMAGE_URL" | sed 's/&amp;/\&/g')

          if [[ "$IMAGE_URL" == /* ]]; then
            IMAGE_URL="${SITE_URL}${IMAGE_URL}"
          fi

          echo "Testing image:"
          echo "$IMAGE_URL"

          CONTENT_TYPE=$(curl \
            --fail \
            --head \
            --silent \
            --show-error \
            "$IMAGE_URL" \
            | awk -F': ' '/^content-type:/ {print $2}' \
            | tr -d '\r')

          echo "Content-Type: $CONTENT_TYPE"

          if [[ ! "$CONTENT_TYPE" =~ ^image/ ]]; then
            echo "Expected image MIME type, got:"
            echo "$CONTENT_TYPE"
            exit 1
          fi

          echo "Avatar image delivery works"

      - name: Check OG image
        if: steps.skip.outputs.skip != 'true'
        env:
          SITE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          MAX_ATTEMPTS=30

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Checking OG image ($attempt/$MAX_ATTEMPTS)"

            HTML=$(curl \
              --fail \
              --silent \
              --show-error \
              "$SITE_URL" || true)

            if [ -n "$HTML" ]; then
              OG_IMAGE=$(echo "$HTML" \
                | grep -oP '<meta property="og:image" content="\K[^"]+' \
                | head -n 1)

              if [ -n "$OG_IMAGE" ]; then
                echo "Found OG image:"
                echo "$OG_IMAGE"

                if [[ "$OG_IMAGE" == /* ]]; then
                  OG_IMAGE="$SITE_URL$OG_IMAGE"
                fi

                OG_IMAGE="${OG_IMAGE}?ci_check=$(date +%s)"

                echo "Fetching OG image..."

                if curl \
                  --fail \
                  --silent \
                  --show-error \
                  --output og-image.png \
                  "$OG_IMAGE"; then

                  FILE_TYPE=$(file og-image.png)

                  echo "$FILE_TYPE"

                  if echo "$FILE_TYPE" | grep -q "PNG image"; then
                    echo "OG image rendered successfully"
                    exit 0
                  fi
                fi
              fi
            fi

            echo "OG image not ready yet. Waiting 10 seconds..."
            sleep 10
          done

          echo "Timed out waiting for OG image"
          exit 1
